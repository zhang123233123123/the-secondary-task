dialogues_path: stress_test_150turn_deepseek/dialogues_150turn_52x.jsonl
prompts_path: frozen_inputs/prompts/prompts_persona_20260311_newprompts.json
max_turns: 150
output_dir: stress_test_150turn_deepseek/output
resume_strategy: reconstruct
flush_policy: per_turn
retries: 3
timeout: 120
truncation_policy: sliding_window
max_history_messages: 9000000
max_context_chars: 420000
abort_on_error: false
input_compatibility_mode: true
frozen_index_path: frozen_inputs/index.json
require_approved_prompts: false
require_approved_dialogues: false
prepare_chunk_turns: 20
prepare_chunk_context_turns: 24
llm2:
  provider: openai
  model: deepseek-v3.2
  api_key_env: BST_API_KEY
  base_url: https://maas.bstllm.com/v1
  temperature: 0.9
  top_p: 1.0
llm3:
  provider: openai
  model: gpt-4o-mini
  api_key_env: BST_API_KEY
  base_url: https://maas.bstllm.com/v1
  temperature: 0.7
  top_p: 1.0
llm4:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com/v1
  temperature: 0.0
  top_p: 1.0
