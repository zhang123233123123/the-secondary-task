<!DOCTYPE html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StyleDrift Lab - API 密钥设置</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3c83f6",
              "primary-dark": "#2563eb",
              "background-dark": "#101723",
              "card-dark": "#182334",
              "border-dark": "#314668",
              "text-subtle": "#90a7cb",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
              mono: ["Roboto Mono", "monospace"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              "2xl": "1rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background-dark font-display text-white min-h-screen antialiased selection:bg-primary selection:text-white"
  >
    <div class="max-w-5xl mx-auto px-6 py-8 flex flex-col gap-8">
      <header class="flex items-center justify-between gap-4 border-b border-border-dark pb-5">
        <div class="space-y-1">
          <p class="text-xs text-text-subtle uppercase tracking-wide">StyleDrift Lab</p>
          <h1 class="text-3xl font-bold tracking-tight">API 密钥设置</h1>
          <p class="text-sm text-text-subtle">
            为本项目配置本地推理凭据。
          </p>
        </div>
        <div id="settings-status-badge" class="px-3 py-1 rounded-full text-xs font-mono border">
          检查中...
        </div>
      </header>

      <main class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <section class="md:col-span-2 bg-card-dark border border-border-dark rounded-2xl p-6 space-y-5">
          <div class="space-y-1">
            <h2 class="text-lg font-semibold">DeepSeek API 密钥</h2>
            <p class="text-xs text-text-subtle">
              当前仅从进程环境变量读取。
            </p>
          </div>

          <div class="space-y-2">
            <label class="text-sm text-white">必填环境变量</label>
            <div class="bg-background-dark border border-border-dark rounded-lg py-2.5 px-3 text-sm font-mono">
              DEEPSEEK_API_KEY
            </div>
            <p class="text-xs text-text-subtle">
              当前(脱敏)： <span id="settings-masked-value" class="font-mono">-</span>
            </p>
          </div>

          <div class="space-y-2">
            <label class="text-sm text-white" for="settings-key-input">在当前会话设置密钥</label>
            <input
              id="settings-key-input"
              type="password"
              autocomplete="off"
              placeholder="sk-..."
              class="w-full bg-background-dark border border-border-dark rounded-lg py-2.5 px-3 text-sm font-mono focus:outline-none focus:border-primary"
            />
            <p class="text-xs text-text-subtle">
              仅写入当前 <span class="font-mono">dev_server.py</span> 进程环境变量。
              除非在 shell 中导出，否则重启服务会清空。
            </p>
            <pre class="bg-background-dark border border-border-dark rounded-lg p-3 text-xs font-mono overflow-x-auto"><code>export DEEPSEEK_API_KEY="your_key_here"
python dev_server.py --port 8000</code></pre>
          </div>

          <div class="flex items-center gap-3">
            <button
              id="settings-save-btn"
              type="button"
              class="px-5 py-2.5 rounded-lg bg-primary hover:bg-primary-dark text-white text-sm font-semibold transition-colors"
            >
              保存 Key
            </button>
            <button
              id="settings-clear-btn"
              type="button"
              class="px-5 py-2.5 rounded-lg border border-border-dark text-red-300 hover:text-red-200 hover:bg-background-dark text-sm transition-colors"
            >
              清空密钥
            </button>
            <button
              id="settings-refresh-btn"
              type="button"
              class="px-5 py-2.5 rounded-lg border border-border-dark text-text-subtle hover:text-white hover:bg-background-dark text-sm transition-colors"
            >
              刷新状态
            </button>
          </div>
          <div id="settings-message" class="text-sm text-text-subtle">
            等待操作...
          </div>
        </section>

        <aside class="bg-card-dark border border-border-dark rounded-2xl p-6 space-y-4">
          <h3 class="text-sm font-semibold uppercase tracking-wide text-text-subtle">导航</h3>
          <a
            id="settings-open-setup"
            href="/frontend/experiment-setup.html"
            class="block px-3 py-2 rounded-lg border border-border-dark text-text-subtle hover:text-white hover:bg-background-dark transition-colors"
            >打开配置</a
          >
          <a
            id="settings-open-monitor"
            href="/frontend/live-monitor.html"
            class="block px-3 py-2 rounded-lg border border-border-dark text-text-subtle hover:text-white hover:bg-background-dark transition-colors"
            >打开监控</a
          >
          <a
            id="settings-open-results"
            href="/frontend/analysis.html"
            class="block px-3 py-2 rounded-lg border border-border-dark text-text-subtle hover:text-white hover:bg-background-dark transition-colors"
            >打开结果</a
          >
          <a
            id="settings-open-prep"
            href="/frontend/data-preparation.html"
            class="block px-3 py-2 rounded-lg border border-border-dark text-text-subtle hover:text-white hover:bg-background-dark transition-colors"
            >打开数据准备</a
          >
          <a
            id="settings-open-config"
            href="/frontend/configuration.html"
            class="block px-3 py-2 rounded-lg border border-border-dark text-text-subtle hover:text-white hover:bg-background-dark transition-colors"
            >打开配置编辑</a
          >
        </aside>
      </main>
    </div>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const runId = params.get("run_id");
        const configPath = params.get("config_path");

        const badge = document.getElementById("settings-status-badge");
        const maskedValue = document.getElementById("settings-masked-value");
        const msg = document.getElementById("settings-message");
        const keyInput = document.getElementById("settings-key-input");
        const saveBtn = document.getElementById("settings-save-btn");
        const clearBtn = document.getElementById("settings-clear-btn");
        const refreshBtn = document.getElementById("settings-refresh-btn");
        const setupLink = document.getElementById("settings-open-setup");
        const monitorLink = document.getElementById("settings-open-monitor");
        const resultsLink = document.getElementById("settings-open-results");
        const prepLink = document.getElementById("settings-open-prep");
        const configLink = document.getElementById("settings-open-config");

        function withContext(path) {
          const q = new URLSearchParams();
          if (runId) q.set("run_id", runId);
          if (configPath) q.set("config_path", configPath);
          const query = q.toString();
          return query ? path + "?" + query : path;
        }

        function syncLinks() {
          if (setupLink) setupLink.href = withContext("/frontend/experiment-setup.html");
          if (monitorLink) monitorLink.href = withContext("/frontend/live-monitor.html");
          if (resultsLink) resultsLink.href = withContext("/frontend/analysis.html");
          if (prepLink) prepLink.href = withContext("/frontend/data-preparation.html");
          if (configLink) configLink.href = withContext("/frontend/configuration.html");
        }

        function setBadge(configured) {
          if (!badge) return;
          badge.className =
            "px-3 py-1 rounded-full text-xs font-mono border " +
            (configured
              ? "bg-green-500/10 border-green-500/30 text-green-400"
              : "bg-red-500/10 border-red-500/30 text-red-300");
          badge.textContent = configured ? "已配置" : "未配置";
        }

        async function refreshStatus() {
          try {
            const response = await fetch("/settings/apikey/status");
            if (!response.ok) throw new Error("Failed to read API key status");
            const data = await response.json();
            setBadge(!!data.configured);
            if (maskedValue) maskedValue.textContent = data.masked_key || "-";
            if (msg) {
              msg.textContent = data.configured
                ? "API key detected in process environment."
                : "API key is missing in process environment.";
            }
          } catch (error) {
            if (msg) msg.textContent = "状态 check failed: " + String(error.message || error);
            setBadge(false);
          }
        }

        async function saveKey() {
          const value = (keyInput && keyInput.value ? keyInput.value : "").trim();
          if (!value) {
            if (msg) msg.textContent = "Please enter a non-empty API key first.";
            return;
          }
          try {
            if (msg) msg.textContent = "Saving API key...";
            const response = await fetch("/settings/apikey", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ deepseek_api_key: value }),
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "Failed to save key");
            if (keyInput) keyInput.value = "";
            if (msg) msg.textContent = data.message || "API key saved.";
            await refreshStatus();
          } catch (error) {
            if (msg) msg.textContent = "保存 failed: " + String(error.message || error);
          }
        }

        async function clearKey() {
          try {
            if (msg) msg.textContent = "Clearing API key...";
            const response = await fetch("/settings/apikey", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ clear: true }),
            });
            const data = await response.json();
            if (!response.ok || !data.ok) throw new Error(data.error || "Failed to clear key");
            if (keyInput) keyInput.value = "";
            if (msg) msg.textContent = data.message || "API key cleared.";
            await refreshStatus();
          } catch (error) {
            if (msg) msg.textContent = "Clear failed: " + String(error.message || error);
          }
        }

        if (saveBtn) saveBtn.addEventListener("click", saveKey);
        if (clearBtn) clearBtn.addEventListener("click", clearKey);
        if (refreshBtn) refreshBtn.addEventListener("click", refreshStatus);
        syncLinks();
        refreshStatus();
      })();
    </script>
  </body>
</html>
