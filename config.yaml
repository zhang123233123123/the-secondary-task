dialogues_path: frozen_inputs/dialogues/dialogues_v_initial.jsonl
prompts_path: frozen_inputs/prompts/prompts_v_initial.json
max_turns: 10
output_dir: output
resume_strategy: reconstruct
flush_policy: per_turn
retries: 3
timeout: 30
truncation_policy: sliding_window
max_context_chars: 8000
abort_on_error: false
input_compatibility_mode: true
frozen_index_path: frozen_inputs/index.json
require_approved_prompts: true
require_approved_dialogues: true
prepare_dialogue_count: 10
prepare_dialogue_turns: 6
prepare_domain_distribution:
  creative: 0.25
  finance: 0.25
  mental_health: 0.25
  medicine: 0.25

llm1:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com/v1
  temperature: 0.2
  top_p: 1.0

llm2:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com/v1
  temperature: 0.9
  top_p: 1.0

llm3:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com/v1
  temperature: 0.7
  top_p: 1.0

llm4:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com/v1
  temperature: 0.0
  top_p: 1.0
